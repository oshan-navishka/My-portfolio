<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Assignment-IV</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .card {
            position: relative;
            width: 100%;
        }

        .card-header {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 14px 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            z-index: 10;
        }

        .card-body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-body h1 {
            font-size: 100px;
            font-weight: 900;
        }

        .card-1 .card-header { background-color: #e53935; }
        .card-1 .card-body   { background-color: #ffffff; color: #000; }

    
        .card-2 .card-header { background-color: #0d2f5e; }
        .card-2 .card-body   { background-color: #64b5f6; color: #000; }

        .card-3 .card-header { background-color: #2c2c2c; }
        .card-3 .card-body   { background-color: #555555; color: #fff; }

        .card-4 .card-header { background-color: #8c320b; }
        .card-4 .card-body   { background-color: #ff7300; color: #fff; }
    </style>
</head>
<body>

    <div class="card card-1">
        <div class="card-header">Card 1</div>
        <div class="card-body">
            <h1>Hello</h1>
        </div>
    </div>

    <div class="card card-2">
        <div class="card-header">Card 2</div>
        <div class="card-body">
            <h1>How</h1>
        </div>
    </div>

    <div class="card card-3">
        <div class="card-header">Card 3</div>
        <div class="card-body">
            <h1>Are</h1>
        </div>
    </div>

    <div class="card card-4">
        <div class="card-header">Card 4</div>
        <div class="card-body">
            <h1>You!</h1>
        </div>
    </div>

</body>
</html>
