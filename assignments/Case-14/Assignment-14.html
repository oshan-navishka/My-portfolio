<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Assignment-XIII</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">
    <link rel="stylesheet" href="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        #mainSection{
            width: 1000px;
            height: 500px;
            background-color: gainsboro;
            position: relative;
        }

        #whiteKeySection{
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            display: flex;
            justify-content: space-evenly;
            flex-direction: row;
        }

        #BlackKeySection{
            width: 70%;
            height: 60%;
            position: relative;
            margin: auto;
            display: flex;
            justify-content: space-evenly;
            flex-direction: row;
        }

        .white-key{
            width: 90px;
            height: 95%;
            border: 1px solid black;
            background-color: white;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .black-key{
            width: 95px;
            height: 100%;
            border: 1px solid black;
            background-color: black;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .white-key:active{
            background: linear-gradient(to bottom,white,white,white,gray);
            height: 93%;
        }

        .black-key:active{
            background: linear-gradient(to bottom,black,black,black,gray);
            height: 97%;
        }
    </style>
</head>
<body>
<section id="mainSection">
    <section id="whiteKeySection">
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
    </section>

    <section id="BlackKeySection">
        <div class="black-key"></div>
        <div class="black-key"></div>
        <div class="black-key"></div>
        <div class="black-key"></div>
        <div class="black-key"></div>
        <div class="black-key"></div>
    </section>
</section>
</body>
</html>
