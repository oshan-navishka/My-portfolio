<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">

    <title>Assignment-XIV</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">
    <link rel="stylesheet" href="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        main{
            width: 400vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
            animation: slider 12s infinite;
        }

        main > section{
            width: 100vw;
            height: 100vh;
        }

        @keyframes slider{
            0%,20%{
                transform: translateX(0);
            }

            25%,45%{
                transform: translateX(-100vw);
            }

            50%,70%{
                transform: translateX(-200vw);
            }

            75%,95%{
                transform: translateX(-300vw);
            }
        }

    </style>
</head>
<body>
    <main>
        <section>
            <img src="../assets/takanashi-hoshino-7680x4320-25273.jpg" alt="img1" width="100%">
    </section>
        <section>
            <img src="../assets/cerro-torre-7680x4320-25387.jpg" alt="img2" width="100%">
        </section>
        <section>
            <img src="../assets/loak-avatar-tsireya-7680x4320-25480.jpg" alt="img3" width="100%">
        </section>
        <section>
            <img src="../assets/zenitsu-agatsuma-5120x2880-24472.png" alt="img4" width="100%">
        </section>
    </main>
</body>
</html>
