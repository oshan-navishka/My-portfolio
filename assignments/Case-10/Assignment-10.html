<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Assignment-X</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">
    <link rel="stylesheet" href="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
     
    body{
        background-color: rgba(255, 255, 255, 0.944);
    }
    div{
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid palevioletred;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        animation: animation 1s linear infinite;
    }

    @keyframes animation {
        0%{
            width: 100px;
            height:100px;
            border: 6px solid rgb(8, 255, 111);
            opacity: 1;
        }

        25%{
            width: 200px;
            height:200px;
            border: 5px solid rgb(8, 255, 102);
            opacity: 0.8;
        }

        50%{
            width: 300px;
            height:300px;
            border: 4px solid rgb(0, 255, 111);
            opacity: 0.6;
        }

        75%{
            width: 400px;
            height:400px;
            border: 3px solid rgb(8, 255, 111);
            opacity: 0.4;
        }

        100%{
            width: 500px;
            height:500px;
            border: 0 solid rgb(8, 255, 111);
            opacity: 0.2;
        }
    }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
